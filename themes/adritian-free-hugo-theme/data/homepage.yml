# about
about:
  enable: true
  title: "Who am I?"
  content: >

    <p class="lead">
    For many years, I have focused on <b>building high-performing SRE teams</b>. I have extensive experience nurturing talent, enabling growth, and helping teams achieve their goals. I care deeply about people and believe in respectful, direct feedback.
    </p>

    <p class="lead">
    Besides leadership experience, I have deep knowledge of Linux internals for running services with 24/7/365 availability requirements. My core technical skills include Linux, Python and shell automation, configuration management (Puppet, Chef, Ansible), Docker, Kubernetes, and PostgreSQL.
    </p>

    <p class="lead">
    I actively leverage modern AI technologies whenever they bring clear value to my work: faster analysis, better automation, and more effective engineering workflows.
    </p>

    <p class="lead">
    Outside of work, I also enjoy building with AI. One of my side projects is a Telegram bot: <a target='_blank' href="https://github.com/smith3v/tg-word-reminder">tg-word-reminder</a>. It helps users learn foreign-language vocabulary through repetitive practice using a Spaced Repetitive Review technique.
    </p>

    <p class="lead">
    I love <a target='_blank' href="https://www.strava.com/athletes/4615821">to run</a> for health and happiness.
    </p>

  button:
    icon: "icon-smile-fill"
    btnText: "About Me"
    URL: "https://www.linkedin.com/in/neuron/"
  image:
    x: "images/who-am-i/user-picture.png"
    _2x: "images/who-am-i/user-picture@2x.png"

